<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTC Assist Pro | Clinical Intelligence</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f7ff',
                            100: '#e0effe',
                            200: '#bae0fd',
                            500: '#0085FF',
                            600: '#0066CC',
                            700: '#004C99',
                            900: '#00264D'
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen">

    <!-- NAV -->
    <nav class="sticky top-0 z-50 glass-card border-b px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center text-white">
                <i class="fas fa-stethoscope"></i>
            </div>
            <h1 class="font-black text-lg text-brand-900">OTC Assist PRO</h1>
        </div>

        <div class="flex gap-6 text-xs font-bold text-gray-400 uppercase">
            <span onclick="switchView('diagnostics')" class="nav-link active" data-view="diagnostics">Symptom Checker</span>
            <span onclick="switchView('firstaid')" class="nav-link" data-view="firstaid">First Aid</span>
            <span onclick="switchView('lab')" class="nav-link" data-view="lab">Diagnostic Kits</span>
            <span onclick="switchView('market')" class="nav-link" data-view="market">Drug Index</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">

        <!-- Views -->
        <div id="view-diagnostics" class="view-content active">
            <input id="sym-search" placeholder="Search symptoms..." class="border p-2 mb-4 w-full">
            <div id="sym-cloud" class="flex flex-wrap gap-2"></div>
            <div id="results-engine" class="grid grid-cols-2 gap-4 mt-6"></div>
        </div>

        <div id="view-firstaid" class="view-content">
            <div id="firstaid-grid"></div>
        </div>

        <div id="view-lab" class="view-content">
            <div id="lab-grid"></div>
        </div>

        <div id="view-market" class="view-content">
            <table class="w-full">
                <tbody id="market-table"></tbody>
            </table>
        </div>

    </main>

    <!-- JS -->
    <script src="data.js"></script>
    <script src="app.js"></script>
 <footer class="text-center text-slate-400 text-sm pb-8">
            <p>&copy; 2026 OTC Medical Agent 2.0. Designed by Sharondroid.</p>
        </footer>
</body>
</html>
