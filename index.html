<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTC Assist Pro</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-50 font-sans">

  <!-- NAV -->
  <nav class="bg-white shadow p-4 flex justify-between">
    <h1 class="font-bold text-blue-600">OTC Assist PRO</h1>

    <div class="flex gap-6 text-sm">
      <button class="nav-link active" data-view="diagnostics">Symptom Checker</button>
      <button class="nav-link" data-view="firstaid">First Aid</button>
      <button class="nav-link" data-view="lab">Diagnostic Kits</button>
      <button class="nav-link" data-view="market">Drug Index</button>
    </div>
  </nav>

  <main class="p-6 max-w-6xl mx-auto">

    <!-- SYMPTOM CHECKER -->
    <section id="view-diagnostics" class="view active">
      <input id="search" placeholder="Search symptoms..." class="w-full p-2 border rounded mb-4">

      <div id="symptoms" class="flex flex-wrap gap-2 mb-6"></div>

      <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </section>

    <!-- FIRST AID -->
    <section id="view-firstaid" class="view hidden">
      <div id="firstaid"></div>
    </section>

    <!-- LAB -->
    <section id="view-lab" class="view hidden">
      <div id="lab"></div>
    </section>

    <!-- MARKET -->
    <section id="view-market" class="view hidden">
      <table class="w-full border">
        <tbody id="market"></tbody>
      </table>
    </section>

  </main>

  <!-- JS -->
  <script src="data.js" defer></script>
  <script src="app.js" defer></script>

 <footer class="text-center text-slate-400 text-sm pb-8">
            <p>&copy; 2026 OTC Medical Agent 2.0. Designed by Sharondroid.</p>
        </footer>

	
</body>
</html>
